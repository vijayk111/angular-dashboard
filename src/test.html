<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AT&T Snappy Unified Spiral</title>
    <style>
        :root {
            --att-blue: #00A8E0;
            --glow: rgba(0, 168, 224, 0.35);
            --wireframe: rgba(0, 0, 0, 0.035);
            --speed: 2.2s; 
            --stagger: 0.06s; /* Tightened delay for nearly simultaneous movement */
            --zoom-speed: 0.7s;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: #ffffff; overflow: hidden; font-family: sans-serif;
        }

        .loader-container {
            position: relative; width: 260px; height: 260px;
            transform: rotate(-3deg);
            transition: transform var(--zoom-speed) cubic-bezier(0.85, 0, 0.15, 1), opacity var(--zoom-speed);
        }

        svg { width: 100%; height: 100%; overflow: visible; }

        .skeleton { fill: none; stroke: var(--wireframe); stroke-width: 0.5; }

        .fiber {
            fill: none; stroke: var(--att-blue); stroke-width: 7.5;
            stroke-linecap: butt; 
            filter: drop-shadow(0 0 3px var(--glow));
            opacity: 0;
            animation: 
                reveal 0.4s forwards, 
                flow var(--speed) infinite linear;
        }

        .f-outer { stroke-dasharray: 45 255; }
        .f-center { stroke-dasharray: 70 230; stroke-width: 8.5; }

        @keyframes reveal {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes flow {
            from { stroke-dashoffset: 300; }
            to { stroke-dashoffset: 0; }
        }

        /* Unified Timing - The tight 0.06s spiral */
        .l1 { animation-delay: 0s, 0s; }
        .l2 { animation-delay: var(--stagger), var(--stagger); }
        .l3 { animation-delay: calc(var(--stagger) * 2), calc(var(--stagger) * 2); }
        .l4 { animation-delay: calc(var(--stagger) * 3), calc(var(--stagger) * 3); }

        .back { opacity: 0.07; stroke-width: 5.5; }
        .b1 { animation-delay: 0s, calc((var(--speed) / -2)); }
        .b2 { animation-delay: var(--stagger), calc((var(--speed) / -2) + var(--stagger)); }
        .b3 { animation-delay: calc(var(--stagger) * 2), calc((var(--speed) / -2) + (var(--stagger) * 2)); }
        .b4 { animation-delay: calc(var(--stagger) * 3), calc((var(--speed) / -2) + (var(--stagger) * 3)); }

        /* SNAPPY CAP REVEAL - Time reduced to 0.8s */
        .node {
            fill: var(--att-blue);
            filter: drop-shadow(0 0 2px var(--glow));
            opacity: 0;
            animation: reveal 0.5s 0.8s forwards;
        }

        .loaded .loader-container {
            transform: rotate(-3deg) scale(135);
            opacity: 0;
            pointer-events: none;
        }

        .btn-finish {
            position: absolute; bottom: 60px;
            padding: 12px 30px; background: #000; color: #fff;
            border: none; border-radius: 50px; cursor: pointer;
            font-size: 10px; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="loader-container" id="mainLoader">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="48" class="skeleton" />
            
            <ellipse cx="50" cy="32" rx="38" ry="8" class="fiber f-outer back b1" />
            <ellipse cx="50" cy="44" rx="47" ry="10" class="fiber f-center back b2" />
            <ellipse cx="50" cy="56" rx="47" ry="10" class="fiber f-center back b3" />
            <ellipse cx="50" cy="68" rx="38" ry="8" class="fiber f-outer back b4" />

            <ellipse cx="50" cy="13" rx="18" ry="4" class="node" /> 
            <ellipse cx="50" cy="87" rx="18" ry="4" class="node" />

            <ellipse cx="50" cy="32" rx="38" ry="8" class="fiber f-outer l1" />
            <ellipse cx="50" cy="44" rx="47" ry="10" class="fiber f-center l2" />
            <ellipse cx="50" cy="56" rx="47" ry="10" class="fiber f-center l3" />
            <ellipse cx="50" cy="68" rx="38" ry="8" class="fiber f-outer l4" />
        </svg>
    </div>

    <button class="btn-finish" onclick="document.body.classList.add('loaded')">Complete Load</button>

</body>
</html>
