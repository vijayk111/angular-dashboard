<div class="table-container">
  <div class="table-header">
    <div>
      <h3>Table Contents</h3>
      <p class="subtext">A quick snapshot of recent items</p>
    </div>
    <div class="table-actions">
      <button mat-button>
        <mat-icon>filter_list</mat-icon>
        Filter
      </button>
      <button mat-button>
        <mat-icon>more_vert</mat-icon>
      </button>
    </div>
  </div>

  <table mat-table [dataSource]="dataSource" class="custom-table">
    
    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> <mat-checkbox></mat-checkbox> Name <mat-icon>north</mat-icon></th>
      <td mat-cell *matCellDef="let row"> <mat-checkbox></mat-checkbox> {{row.name}} </td>
    </ng-container>

    <!-- Content Column -->
    <ng-container matColumnDef="content">
      <th mat-header-cell *matHeaderCellDef> Content <mat-icon>unfold_more</mat-icon></th>
      <td mat-cell *matCellDef="let row"> {{row.content}} </td>
    </ng-container>

    <!-- Status Column -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let row">
        <span class="status-badge" [ngClass]="row.status.toLowerCase()">
          <span class="dot"></span> {{row.status}}
        </span>
      </td>
    </ng-container>

    <!-- Last Updated Column -->
    <ng-container matColumnDef="lastUpdated">
      <th mat-header-cell *matHeaderCellDef> Last update </th>
      <td mat-cell *matCellDef="let row"> {{row.lastUpdated}} </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
